---
layout: default
---

<style>
  .conv-header {
    position: relative;
    overflow: hidden;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.5rem;
    margin-bottom: 2rem;
  }

  .conv-breadcrumb {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }

  .conv-breadcrumb a {
    font-family: 'Inter', sans-serif;
    font-size: 0.65rem;
    color: var(--gold-dim);
    text-decoration: none;
    letter-spacing: 0.05em;
  }

  .conv-breadcrumb a:hover { color: var(--text); }

  .conv-breadcrumb span {
    font-family: 'Inter', sans-serif;
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .conv-number {
    font-family: 'Cormorant SC', serif;
    font-size: 3rem;
    font-weight: 300;
    color: var(--orange);
    opacity: 0.15;
    float: right;
    line-height: 1;
    user-select: none;
    pointer-events: none;
    margin-left: 1rem;
  }

  .conv-title {
    font-family: 'Lora', serif;
    font-size: 1.3rem;
    font-weight: 400;
    color: var(--text);
    line-height: 1.3;
    clear: none;
  }
</style>

<header class="conv-header">
  <div class="conv-breadcrumb">
    <a href="/">← AI A–Z</a>
    {% if site.data.series[page.letter] %}
    <span>{{ site.data.series[page.letter] }}</span>
    {% endif %}
  </div>
  <span class="conv-number" aria-hidden="true">{{ page.number }}</span>
  <h1 class="conv-title">{{ page.title }}</h1>
</header>

{{ content }}
