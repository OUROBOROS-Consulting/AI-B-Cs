<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@300;400;600&family=Inter:wght@300;400;500&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <title>{% if page.title %}{{ page.title }} — {% endif %}AI A–Z</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e0e0e;
      --surface:   #161616;
      --surface-2: #1f1f1f;
      --border:    #2a2a2a;
      --gold:      #C9A84C;
      --gold-dim:  #7a6228;
      --orange:    #E8640A;
      --teal:      #6A8E7F;
      --text:      #E8E4DC;
      --text-dim:  #888075;
      --clip-sm: polygon(12px 0%, calc(100% - 12px) 0%, 100% 12px, 100% calc(100% - 12px), calc(100% - 12px) 100%, 12px 100%, 0% calc(100% - 12px), 0% 12px);
      --clip-md: polygon(20px 0%, calc(100% - 20px) 0%, 100% 20px, 100% calc(100% - 20px), calc(100% - 20px) 100%, 20px 100%, 0% calc(100% - 20px), 0% 20px);
    }

    html { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.6; }

    a { color: var(--gold); text-decoration: none; }
    a:hover { color: var(--text); }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    nav .wordmark {
      font-family: 'Cormorant SC', serif;
      font-size: 0.9rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      color: var(--gold);
      text-decoration: none;
    }
    nav .wordmark:hover { color: var(--text); }
    nav .nav-right {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    main { max-width: 1100px; margin: 0 auto; padding: 3rem 2rem; }

    footer {
      margin-top: 6rem;
      padding: 2rem 2.5rem;
      border-top: 1px solid var(--border);
      font-size: 1.00rem;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="wordmark">AI A–Z</a>
    <span class="nav-right">Apostolos Stamenos &middot; OUROBOROS Consulting</span>
  </nav>
  <main>
    {{ content }}
  </main>
  <footer>
    <span>Apostolos Stamenos &times; OUROBOROS Consulting</span>
    <span style="color: var(--orange); opacity: 0.8;">Claude Sonnet 4.6</span>
  </footer>
</body>
</html>
